# ============================================================================
# Key Decisions
# ============================================================================
decisions:
  - decision: "In-memory job storage instead of database"
    rationale: "Sites are ephemeral (deployed and done). TTL cleanup handles memory. No persistence needed across restarts."

  - decision: "Cloudflare Pages as primary deploy, Vercel as fallback"
    rationale: "Cloudflare includes free CDN + DDoS protection + edge caching. Vercel as fallback for reliability."

  - decision: "Auto-delete oldest Cloudflare project when limit hit"
    rationale: "Free tier has project limits. Auto-cleanup keeps pipeline running without manual intervention."

  - decision: "WebSocket for progress instead of SSE or polling"
    rationale: "Bidirectional needed for future features. Lower overhead than polling for 7-step pipeline updates."

  - decision: "React for generated sites, Vue for the builder frontend"
    rationale: "React sites are standalone deliverables (client gets a React project). Vue is for the builder tool itself -- keeps concerns separate."

  - decision: "data.json as the only per-generation variable"
    rationale: "Template components read from data.json. Makes editing trivial -- change JSON, rebuild. No template modification needed."

  - decision: "Claude Code OAuth fallback for API auth"
    rationale: "Developer convenience -- if running inside Claude Code, no need to set ANTHROPIC_API_KEY separately."

  - decision: "Multiple template support via TEMPLATE_REGISTRY"
    rationale: "Each template is a full React project directory (react/, react-bold/, react-elegant/). Keeps templates independent and swappable."

  - decision: "Turnstile bot verification on generation endpoint"
    rationale: "Public-facing tool -- rate limiter + Turnstile prevents abuse of expensive API calls (Claude + Gemini)."

  - decision: "JSONL for error and deploy logs"
    rationale: "Append-only, no schema migrations, easy to query line-by-line, survives crashes mid-write."

# ============================================================================
# API Gotchas (real, from the code)
# ============================================================================
api_gotchas:
  - gotcha: "Google Maps selectors change frequently"
    detail: "maps_scraper.py is 1141 lines of CSS selectors ported from production scrapers. When Google changes their markup, scraping breaks silently (returns empty fields, not errors)."
    mitigation: "Check scrape results for empty name/address before proceeding to generation."

  - gotcha: "Playwright browser must be installed separately"
    detail: "pip install playwright does NOT install browser binaries. Must run 'playwright install chromium' before first use."
    mitigation: "Dockerfile includes the install step. Devs need to run it manually after pip install."

  - gotcha: "npm must be available for react_builder"
    detail: "react_builder.py shells out to 'npm install && npm run build'. If node/npm not in PATH, build step fails."
    mitigation: "Check node availability at startup or fail fast with clear error."

  - gotcha: "Cloudflare project name sanitization"
    detail: "Cloudflare Pages project names must be lowercase alphanumeric with hyphens only. Business names with special characters get sanitized, which can cause collisions."
    mitigation: "The deployer handles sanitization but watch for duplicate project names."

  - gotcha: "CORS is wide open in development"
    detail: "allow_origins includes '*' for dev convenience. Production should restrict to actual frontend domain."
    mitigation: "Set explicit origins for production deployment."

  - gotcha: "Job storage is in-memory only"
    detail: "All jobs lost on server restart. Deploy log persists (JSONL), but active job state does not."
    mitigation: "By design -- sites are deployed and done. Only matters if restart happens mid-generation."

  - gotcha: "Website scraping is optional but silent"
    detail: "If business website scrape fails or returns empty, pipeline continues without that data. Generated content may be thinner."
    mitigation: "Check the generated content quality. website_scraper failure is logged but not surfaced to user."

  - gotcha: "Gemini image generation is optional"
    detail: "If GEMINI_API_KEY not set, image generation step is silently skipped. Sites use placeholder images."
    mitigation: "Check /health endpoint -- it reports which providers are configured."

  - gotcha: "generate-section expects specific section_type values"
    detail: "Only these are valid: services, faq_items, testimonials, why_choose_us, process_steps. Other values return generic content."
    mitigation: "Frontend enforces valid types via GenerateModal component."

