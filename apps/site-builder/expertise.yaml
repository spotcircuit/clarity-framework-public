      required: false
      purpose: "Gemini for AI image generation (skipped if missing)"
    - name: CLOUDFLARE_API_TOKEN
      required: "one of cloudflare or vercel"
      purpose: "Cloudflare Pages deployment"
    - name: CLOUDFLARE_ACCOUNT_ID
      required: "one of cloudflare or vercel"
      purpose: "Cloudflare account identifier"
    - name: VERCEL_TOKEN
      required: "one of cloudflare or vercel"
      purpose: "Vercel deployment (fallback)"
    - name: VERCEL_TEAM_ID
      required: false
      purpose: "Vercel team identifier"
    - name: SITE_BUILDER_PORT
      required: false
      purpose: "Server port (default: 9405)"
    - name: SITE_BUILDER_HOST
      required: false
      purpose: "Server host (default: 0.0.0.0)"
  frontend:
    - name: VITE_API_BASE_URL
      purpose: "Backend URL (Railway production URL)"
    - name: VITE_GOOGLE_MAPS_API_KEY
