# ============================================================================
# Site Builder -- Clarity Expertise File
# ============================================================================
# Accumulated operational knowledge for the site-builder app.
# Maintained by /se:self-improve and /se:discover commands.
# Source of truth for architecture, gotchas, and decisions.
# ============================================================================

app: site-builder
repo: https://github.com/spotcircuit/site-builder
last_updated: "2026-04-10"
status: production
tagline: "Search any business on Google Maps, get a premium React website in 60 seconds."

# ============================================================================
# Architecture
# ============================================================================
architecture:
  frontend:
    framework: Vue 3 + TypeScript + Pinia + Tailwind CSS
    port: 5177
    deploy: Vercel (auto-deploy from standalone repo)
    key_components:
      - PlacesAutocomplete.vue    # Google Places search input
      - ProgressPanel.vue         # Real-time pipeline step tracker (WebSocket)
      - DevicePreview.vue         # iframe preview with mobile/tablet/desktop switching
      - SiteHistory.vue           # Previously generated sites list
      - SeoScorePanel.vue         # SEO metrics display
      - TemplateCards.vue         # Template selection grid
    stores:
      - siteBuilderStore.ts       # Single Pinia store -- all state + actions
    services:
      - api.ts                    # REST client (axios)
      - websocket.ts              # WebSocket client for progress streaming
      - mapsLoader.ts             # Google Maps JS API lazy loader

  backend:
    framework: FastAPI + Python 3.13 + asyncio
    port: 9405
    deploy: Railway (auto-deploy from standalone repo)
    entrypoint: backend/main.py
    total_lines: ~5,500 across 13 modules
    modules:
      maps_url_parser:
        file: maps_url_parser.py
        lines: 293
        purpose: Parse Google Maps URLs and extract place IDs, coordinates, search queries
      maps_scraper:
        file: maps_scraper.py
        lines: 1141
        purpose: Playwright-based scraper for Google Maps business profiles (photos, reviews, hours, services, location)
        note: "Selectors from getrankedlocal production scrapers, confirmed working 2025"
      website_scraper:
        file: website_scraper.py
        lines: 1060
        purpose: Scrape business website for supplementary content (optional step)
      site_generator:
        file: site_generator.py
        lines: 1107
        purpose: Claude API content generation -- business data to structured website content
        model: claude-sonnet-4-20250514
        auth_fallback: "Falls back to Claude Code OAuth token (~/.claude/.credentials.json) when no ANTHROPIC_API_KEY"
      image_generator:
        file: image_generator.py
        lines: 302
        purpose: Gemini 2.5 Flash Image generation for site visuals
      react_builder:
        file: react_builder.py
        lines: 566
        purpose: "Assembles Vite + React + Tailwind project from templates, injects data.json, runs npm build"
      cloudflare_deployer:
        file: cloudflare_deployer.py
        lines: 258
        purpose: "Deploy to Cloudflare Pages via wrangler CLI (includes CDN, DDoS protection, edge caching)"
      vercel_deployer:
        file: vercel_deployer.py
        lines: 157
        purpose: Deploy to Vercel via REST API (fallback provider)
      websocket_manager:
        file: websocket_manager.py
        lines: 180
        purpose: Singleton WebSocket broadcaster for real-time pipeline progress
      rate_limiter:
        file: rate_limiter.py
        lines: 154
        purpose: IP-based rate limiting + Cloudflare Turnstile bot verification
      section_mapper:
        file: section_mapper.py
        lines: 271
        purpose: Maps editor section types to React component data structures

  generated_sites:
    framework: React 18 + Tailwind CSS
    build_tool: Vite
    templates:
      modern: "react/ -- Original clean template"
      bold: "react-bold/ -- Bold/dramatic layout"
      elegant: "react-elegant/ -- Clean/minimal layout"
    output: "Static HTML (data.json is the only file that changes per generation)"

  realtime: "WebSocket at /ws -- streams pipeline step progress to frontend"

# ============================================================================
# Pipeline
# ============================================================================
pipeline:
  overview: "Async 7-step pipeline. Each step broadcasts progress via WebSocket. Full generation takes ~60 seconds."
  steps:
    - step: 1
      status_key: parsing_url
      module: maps_url_parser.py
      does: "Parse Google Maps URL to extract place ID, coordinates, or search query. Also accepts direct website URLs."

    - step: 2
      status_key: scraping_profile
      module: maps_scraper.py
      does: "Launch headless Playwright browser, navigate to Maps listing, extract name, address, phone, hours, photos, reviews, services, coordinates."

    - step: 3
      status_key: scraping_website
      module: website_scraper.py
      does: "If business has a website link, scrape it for supplementary content. Optional -- pipeline continues without it."

    - step: 4
      status_key: generating_content
      module: site_generator.py
      does: "Send scraped business data to Claude Sonnet. Returns structured JSON with hero text, about section, services, FAQ, testimonials, and SEO metadata."

    - step: 5
      status_key: generating_images
      module: image_generator.py
      does: "Generate business-relevant images via Gemini 2.5 Flash. Skipped if GEMINI_API_KEY not configured."

    - step: 6
      status_key: building_site
      module: react_builder.py
      does: "Copy React template, inject data.json, run 'npm install && npm run build'. Produces static dist/ folder."

    - step: 7
      status_key: deploying
      module: cloudflare_deployer.py / vercel_deployer.py
      does: "Deploy static dist/ to Cloudflare Pages (primary) or Vercel (fallback). Returns live URL."

  deploy_resolution: |
    Auto-selection priority:
    1. If user explicitly picks "cloudflare" or "vercel", use that
    2. If "auto" or unset: prefer Cloudflare if configured, else Vercel
    3. If "none": skip deployment entirely (local preview only)

# ============================================================================
# API Endpoints
# ============================================================================
api:
  base_url: "http://localhost:9405"
  endpoints:
    - method: POST
      path: /api/generate-site
      purpose: "Start async generation pipeline. Returns job_id immediately."
      params: "maps_url, website_url, business_name, business_category, template_name, deploy_target, business_context, turnstile_token"
      note: "At least one of maps_url or website_url required. business_name required when using website_url without maps_url."

    - method: GET
      path: /api/job/{job_id}
      purpose: "Poll job status (pending/running/complete/error) and pipeline step progress"

    - method: GET
      path: /api/job/{job_id}/data
      purpose: "Get editable data.json payload for the editor"

    - method: GET
      path: /api/job/{job_id}/download
      purpose: "Download generated site as zip archive"

    - method: POST
      path: /api/rebuild-site
      purpose: "Rebuild site with edited data.json (quick preview rebuild)"

    - method: POST
      path: /api/generate-section
      purpose: "AI-regenerate a single section via Claude (services, FAQ, testimonials, why_choose_us, process_steps)"

    - method: POST
      path: /api/redeploy-site
      purpose: "Re-deploy an edited site to the same hosting provider"

    - method: DELETE
      path: /api/site/{project_name}
      purpose: "Delete a deployed site from hosting provider"

    - method: POST
      path: /api/upload-image
      purpose: "Upload user image for editor (served at /uploads/)"

    - method: GET
      path: /api/templates
      purpose: "List available site templates (modern, bold, elegant)"

    - method: GET
      path: /api/sites
      purpose: "List deployed sites from deploy_log.jsonl"

    - method: DELETE
      path: /api/sites
      purpose: "Clear deploy log"

    - method: GET
      path: /api/errors
      purpose: "Read error log (last N entries from error_log.jsonl)"

    - method: DELETE
      path: /api/errors
      purpose: "Clear error log"

    - method: GET
      path: /health
      purpose: "Health check -- returns deployment config status and rate limit info"

    - method: WebSocket
      path: /ws
      purpose: "Real-time pipeline progress. Server broadcasts step updates as JSON messages."

# ============================================================================
# Editor
# ============================================================================
editor:
  section_count: 16
  sections:
    - Hero
    - About
    - Services
    - Gallery
    - CTA (Call to Action)
    - FAQ
    - Testimonials
    - Why Choose Us
    - How It Works
    - Contact
    - Design (theme + colors)
    - SEO (meta tags + descriptions)
    - Visibility (show/hide sections)
    - Social (social media links)
    - Section Order (drag reorder)
    - Rich Text Fields (inline formatting)
  features:
    - "Live iframe preview with device switching (mobile / tablet / desktop)"
    - "AI section regeneration -- send prompt + context to Claude, get new content"
    - "Theme presets: Modern, Classic, Bold, Minimal, Elegant"
    - "Dirty detection via JSON deep comparison (warns before losing edits)"
    - "Quick preview (instant rebuild) vs full rebuild vs redeploy workflow"
    - "Image upload with drag-and-drop"
    - "Generate modal with custom prompt input per section"
  editor_components: 17
  component_list:
    - EditorPanel.vue            # Main editor container
    - EditorAccordion.vue        # Collapsible section wrapper
    - EditorSectionHero.vue
    - EditorSectionAbout.vue
    - EditorSectionServices.vue
    - EditorSectionGallery.vue
    - EditorSectionCTA.vue
    - EditorSectionFAQ.vue
    - EditorSectionTestimonials.vue
    - EditorSectionWhyChooseUs.vue
    - EditorSectionHowItWorks.vue
    - EditorSectionContact.vue
    - EditorSectionDesign.vue
    - EditorSectionSEO.vue
    - EditorSectionVisibility.vue
    - EditorSectionSocial.vue
    - EditorSectionOrder.vue
    - GenerateModal.vue          # AI regeneration prompt dialog
    - ImageField.vue             # Image upload/URL input
    - RichTextField.vue          # Inline rich text editing

# ============================================================================
# Testing
# ============================================================================
testing:
  pattern: "ACT-LEARN-REUSE (self-improving test suite)"
  backend_unit:
    count: 44
    breakdown:
      test_api: 32 tests       # API endpoint tests (httpx AsyncClient)
      test_models: 12 tests    # Pydantic model validation tests
    runner: pytest + pytest-asyncio
    fixtures: "conftest.py -- shared AsyncClient fixture, sample job data"
  frontend_unit:
    count: 65
    breakdown:
      siteBuilderStore: 56 tests  # Pinia store tests (state, actions, getters)
      TemplateCards: 6 tests      # Component rendering tests
      api_service: 3 tests        # API client tests
    runner: vitest
  e2e_smoke:
    count: 22
    file: e2e/site-builder.spec.ts
    runner: Playwright
    speed: "~30 seconds"
  e2e_full_generation:
    count: 11
    file: e2e/full-generation.spec.ts
    runner: Playwright
    speed: "~5 minutes (hits real APIs)"
  total_tests: 142

# ============================================================================
# Deployment
# ============================================================================
deployment:
  backend:
    platform: Railway
    method: "Auto-deploy from spotcircuit/site-builder standalone repo"
    container: Dockerfile
    port: 9405
    host: 0.0.0.0
  frontend:
    platform: Vercel
    method: "Auto-deploy from same standalone repo (frontend/ root)"
  generated_sites:
    primary: "Cloudflare Pages (wrangler CLI direct upload)"
    fallback: "Vercel REST API"
  sync:
    method: "GitHub Action syncs apps/site_builder/ from monorepo to standalone repo on push to main"
  job_management:
    storage: "In-memory dict (not persisted across restarts)"
    ttl_undeployed: "3 days"
    ttl_deployed: "7 days (2x undeployed)"
    cleanup: "Background asyncio task checks hourly, deletes expired jobs + build dirs"
  logging:
    errors: "error_log.jsonl -- append-only, queryable via /api/errors"
    deploys: "deploy_log.jsonl -- append-only, queryable via /api/sites"

