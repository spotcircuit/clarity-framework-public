# ============================================================================
# Demo API -- Clarity Expertise File
# ============================================================================
# Internal deployment tracking service. Tracks what's deployed where,
# surfaces health metrics, and provides rollback capabilities.
# ============================================================================

app: demo-api
repo: https://github.com/spotcircuit/demo-api
last_updated: "2026-04-09"
status: production
tagline: "Internal deployment tracking -- know what's running where, roll back when it isn't."

# ============================================================================
# Architecture
# ============================================================================
architecture:
  framework: FastAPI + Python 3.12
  database: PostgreSQL 16 (async via asyncpg + SQLAlchemy 2.0)
  cache: Redis 7 (deployment status cache, rate limiting)
  container: Docker + docker-compose (local), ECS Fargate (prod)
  ci: GitHub Actions (lint, test, build, deploy)
  port: 8080
  entrypoint: app/main.py
  structure:
    app/main.py:      "FastAPI app factory, lifespan events, middleware"
    app/routes/:      "Route modules -- deployments, services, health, metrics"
    app/models/:      "SQLAlchemy models + Pydantic schemas"
    app/services/:    "Business logic -- deploy_service, rollback_service, metrics_service"
    app/core/:        "Config, database session, Redis client, auth"
    alembic/:         "Database migrations"
    tests/:           "pytest suite -- unit, integration, API"

# ============================================================================
# API Endpoints
# ============================================================================
api:
  base_url: "http://localhost:8080"
  auth: "Bearer token (internal service-to-service)"
  endpoints:
    - "GET  /health                              -- liveness + readiness (DB, Redis, pool stats)"
    - "GET  /api/v1/deployments                  -- list with filtering (service, env, status, dates)"
    - "POST /api/v1/deployments                  -- record new deployment (called by CI pipeline)"
    - "GET  /api/v1/deployments/{id}             -- detail with rollback history"
    - "POST /api/v1/deployments/{id}/rollback    -- trigger rollback, record event"
    - "GET  /api/v1/services                     -- all services with current version per env (cached)"
    - "GET  /api/v1/services/{name}/history      -- deploy history for one service"
    - "GET  /api/v1/metrics/deploy-frequency     -- deploys per period (daily/weekly/monthly)"
    - "GET  /api/v1/metrics/rollback-rate        -- rollback % by service"
    - "GET  /api/v1/metrics/lead-time            -- commit-to-deploy p50/p90/p99"

# ============================================================================
# Testing
# ============================================================================
testing:
  runner: "pytest + pytest-asyncio + httpx"
  total_tests: 47
  breakdown:
    test_deployments_api: 14   # CRUD + filtering + pagination
    test_rollback_api: 8      # Rollback flows + error cases
    test_services_api: 6      # Service listing + history
    test_metrics_api: 7       # All three metrics endpoints
    test_models: 5            # Pydantic validation + SQLAlchemy relationships
    test_cache: 4             # Cache hit/miss/invalidation
    test_auth: 3              # Token validation + missing auth + expired token
  coverage: "89% line coverage"

# ============================================================================
# Deployment
# ============================================================================
deployment:
  local: "docker-compose up (api + postgres + redis)"
  production:
    platform: AWS ECS Fargate (us-east-1)
    database: RDS Postgres (db.t3.micro)
    cache: ElastiCache Redis (cache.t3.micro)
  ci:
    steps: "ruff lint -> pytest --cov -> docker build -> ecs deploy"

# ============================================================================
# Key Decisions
# ============================================================================
decisions:
  - decision: "FastAPI over Express/Hono"
    rationale: "Python-native team. Async first-class. Pydantic validation. Auto OpenAPI docs."

  - decision: "Redis for caching instead of in-memory"
    rationale: "ECS scales to multiple instances. Need shared cache + TTL + pub/sub for invalidation."

  - decision: "asyncpg pool_size=10, max_overflow=5"
    rationale: "Default pool_size=5 caused exhaustion at 20 concurrent. Postgres max_connections=100 gives headroom."

  - decision: "Bearer token auth instead of OAuth/JWT"
    rationale: "Internal service only. Simple shared secret per caller. Rotate quarterly."

  - decision: "Raw SQL for metrics queries"
    rationale: "ORM generates suboptimal queries for PARTITION BY + percentile. Raw SQL is 3x faster."

# ============================================================================
# API Gotchas
# ============================================================================
api_gotchas:
  - gotcha: "Postgres connection pool exhaustion at 20 concurrent requests"
    detail: "SQLAlchemy pool + asyncpg pool are layered. SQLAlchemy allows 15 connections but asyncpg caps at 10."
    mitigation: "Set pool_size=10, max_overflow=5. Added pool metrics to /health."

  - gotcha: "Redis key expiry race condition on cache invalidation"
    detail: "Deploy write + cache delete are not atomic. Stale value can be re-cached between delete and next read."
    mitigation: "Use UNLINK (async delete) + short TTL (30s). Stale window acceptable for internal dashboard."

  - gotcha: "Docker healthcheck timing in ECS"
    detail: "ECS health check starts immediately but FastAPI needs ~3s for migration check + pool warm-up."
    mitigation: "Set healthCheckGracePeriodSeconds=30. Return 503 until startup_complete flag set."

  - gotcha: "Alembic autogenerate misses partial indexes"
    detail: "The deployments(status) WHERE status='in_progress' partial index must be added manually."
    mitigation: "Manual migration for partial indexes. Comment in model referencing the migration."

  - gotcha: "httpx.AsyncClient must be shared, not created per-request"
    detail: "New AsyncClient per request leaks connections. Tests get 'Event loop is closed' on teardown."
    mitigation: "Single client in app.state via lifespan. Tests use shared fixture."

  - gotcha: "Pydantic V2 model_validate vs V1 from_orm"
    detail: "SQLAlchemy models need model_validate(obj, from_attributes=True). Old from_orm() raises AttributeError."
    mitigation: "Set model_config = ConfigDict(from_attributes=True) on all response schemas."

# ============================================================================
# Unvalidated Observations
# ============================================================================
unvalidated_observations:
  - "Rollback endpoint should verify target version actually existed before -- currently accepts any version string"
  - "Metrics queries slow (>500ms) for 90-day range across all services -- needs materialized view"
  - "Seed script creates future timestamps when --days=90 wraps around -- cosmetic but confusing in demos"
